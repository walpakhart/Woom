# PR-time verify — proves the release pipeline still works without
# actually publishing anything. Runs on every PR against main; the
# build step exercises sidecar compilation + tauri bundle but stops
# short of notarize / publish (no Apple creds in PR forks anyway).
#
# Phase reference: SDD workspace `sdd-2508eeb82e`, phase 2 task 9.
# Pubkey ↔ private-key parity smoke test wired in phase 5.

name: Release verify

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-build:
    name: Build + manifest dry-run
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      # See release.yml: install pnpm via npm to bypass codeload 404s
      # on the macOS-14-arm64 runner image.
      - name: Install pnpm
        run: npm install -g pnpm@10.17.1

      # rustup is preinstalled on macos-14. Direct invoke — see
      # release.yml for the codeload-404 background.
      - name: Setup Rust toolchain (universal targets)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          rustup default stable

      # Native `actions/cache` instead of `Swatinem/rust-cache`.
      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-verify-${{ hashFiles('apps/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-verify-

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        run: pnpm -C apps/desktop check

      - name: Build (ad-hoc signing — no Apple creds in PR context)
        run: |
          pnpm sidecars:release
          pnpm --filter @woom/desktop tauri build --target universal-apple-darwin --bundles dmg

      - name: Manifest dry-run
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          node scripts/make-manifest.mjs \
            --dmg "apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/Woom_${VERSION}_universal.dmg" \
            --version "$VERSION" \
            --repo "${{ github.repository }}" \
            --dry-run
