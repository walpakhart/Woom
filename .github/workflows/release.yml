# Woom release pipeline — triggered by `v*` tag push.
#
# End-to-end: cache → install → build universal DMG → sign (Tauri ed25519 +
# Apple Developer ID) → notarize via Apple notarytool → staple ticket →
# build the `latest-mac.json` manifest from the build outputs → publish a
# GitHub Release with the DMG + signature + manifest attached.
#
# Required secrets:
#
#   TAURI_SIGNING_PRIVATE_KEY              ed25519 private key (updater trust root)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD     passphrase (empty allowed)
#
# Optional secrets (Apple Developer ID — enables Gatekeeper-clean DMGs):
#
#   APPLE_CERTIFICATE                      base64-encoded Developer ID p12
#   APPLE_CERTIFICATE_PASSWORD             p12 password
#   APPLE_SIGNING_IDENTITY                 "Developer ID Application: <Name> (<TEAMID>)"
#   APPLE_ID                               Apple developer account email
#   APPLE_PASSWORD                         app-specific password from appleid.apple.com
#   APPLE_TEAM_ID                          10-char team id, e.g. ABCDE12345
#
# When APPLE_SIGNING_IDENTITY is empty, the codesign/notarize/staple steps
# are skipped. The DMG ships ad-hoc signed — users get a one-time Gatekeeper
# warning on first launch (right-click → Open, or `xattr -dr com.apple.quarantine`).
# Tauri's ed25519 updater works regardless of Apple notarization.
#
# Phase reference: SDD workspace `sdd-2508eeb82e`, phase 2.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  # Required for `softprops/action-gh-release` to create + upload assets.
  contents: write

jobs:
  release-macos:
    name: Build + sign + notarize macOS DMG
    runs-on: macos-14
    env:
      # Surface the version (sans leading `v`) to subsequent steps + the
      # manifest builder. `${{ github.ref_name }}` is the tag literal,
      # e.g. `v1.4.2` — strip the `v` for asset filenames + manifest.
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Strip leading v from VERSION
        run: echo "VERSION=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Detect Apple signing availability
        id: apple
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [[ -n "$APPLE_SIGNING_IDENTITY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Apple Developer ID signing: ENABLED"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Apple Developer ID signing: DISABLED — DMG will ship ad-hoc signed"
          fi

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      # pnpm install via npm instead of `pnpm/action-setup` action.
      # The action download was hitting codeload.github.com 404s on the
      # macOS-14-arm64 runner image (codeload works fine from other
      # networks — Azure region-level block / WAF mistrigger). Direct
      # npm install bypasses the Actions marketplace tarball download
      # entirely and is one network hop instead of two.
      - name: Install pnpm
        run: npm install -g pnpm@10.17.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit frontend
        # Build the frontend EXPLICITLY before `tauri build` even though
        # `tauri.conf.json#build.beforeBuildCommand` would also run it.
        # Two reasons we don't trust the implicit path:
        #   1. Swatinem/rust-cache restores a `target/` from a prior run,
        #      and tauri-codegen embeds whatever was in `apps/desktop/build/`
        #      at codegen time — if cache was warmed before vite ran, the
        #      bundle ships with a stale (or empty) frontend and the
        #      WebView paints black. 0.1.1 shipped exactly this bug.
        #   2. We want a deterministic guard rail (the verify step below)
        #      that fails the job loudly instead of silently producing a
        #      broken DMG.
        run: pnpm --filter @woom/desktop build

      - name: Verify frontend build is non-empty
        run: |
          INDEX="apps/desktop/build/index.html"
          if [[ ! -s "$INDEX" ]]; then
            echo "::error::$INDEX missing or empty after vite build — refusing to ship a broken bundle"
            exit 1
          fi
          if ! grep -q "_app/immutable" "$INDEX"; then
            echo "::error::$INDEX does not reference SvelteKit assets — bundle is corrupt"
            exit 1
          fi
          echo "Frontend OK: $(wc -c < "$INDEX") bytes, $(find apps/desktop/build/_app -type f | wc -l) asset files"

      - name: Invalidate cargo cache for woom-desktop crate
        # Touch lib.rs so cargo re-evaluates `tauri::generate_context!()`
        # and re-embeds the freshly-built frontend. Without this, the
        # Swatinem cache (which keys on Cargo.lock + source-file mtimes)
        # can hand back a cached binary that still embeds the previous
        # run's `apps/desktop/build/` — exactly the regression that
        # produced the 0.1.1 black-screen build.
        run: touch apps/desktop/src-tauri/src/lib.rs

      - name: Build universal DMG
        env:
          # Tauri signer (ed25519 over the .dmg bytes — used by the
          # updater plugin for trust verification on the install side).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID signing — ONLY surface when actually enabled.
          # Otherwise tauri-bundler sees a present-but-empty APPLE_CERTIFICATE
          # and calls `security import` on garbage, failing with
          # "SecKeychainItemImport: One or more parameters ... were not valid".
          # Gating on `steps.apple.outputs.enabled` keeps the env vars unset
          # when there's no real cert, which makes tauri-bundler skip the
          # codesign path entirely (ad-hoc signed DMG, Gatekeeper warning OK).
          APPLE_CERTIFICATE: ${{ steps.apple.outputs.enabled == 'true' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ steps.apple.outputs.enabled == 'true' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ steps.apple.outputs.enabled == 'true' && secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ steps.apple.outputs.enabled == 'true' && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ steps.apple.outputs.enabled == 'true' && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ steps.apple.outputs.enabled == 'true' && secrets.APPLE_TEAM_ID || '' }}
        run: |
          # Belt-and-braces: when Apple signing is disabled, also `unset` the
          # vars in this shell so child processes (tauri-bundler) see them as
          # truly absent, not present-but-empty. Some code paths in the
          # bundler branch on `env::var(...).is_ok()` rather than non-empty.
          if [[ "${{ steps.apple.outputs.enabled }}" != "true" ]]; then
            unset APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID
          fi
          pnpm sidecars:release:universal
          pnpm --filter @woom/desktop tauri build --target universal-apple-darwin

      - name: Build .app.tar.gz updater payload
        run: |
          # Tauri 2.x's macOS updater consumes a gzipped tar of the .app
          # bundle, NOT the DMG (the in-app updater pipes the download
          # through gunzip → "invalid gzip header" if you feed it a DMG).
          # So we also produce Woom_<ver>_universal.app.tar.gz here from
          # the same .app the DMG was built from. The DMG stays as the
          # "first install" download for new users.
          APP_DIR="$PWD/apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos"
          test -d "$APP_DIR/Woom.app" || { echo "::error::Woom.app not found at $APP_DIR"; exit 1; }
          TARBALL="$APP_DIR/Woom_${VERSION}_universal.app.tar.gz"
          tar czf "$TARBALL" -C "$APP_DIR" Woom.app
          ls -la "$TARBALL"
          echo "TARBALL_PATH=$TARBALL" >> "$GITHUB_ENV"

      - name: Sign DMG and updater tarball with Tauri key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # Sign BOTH artifacts with the same ed25519 key:
          # - DMG sig is kept as a defence-in-depth artifact for users
          #   downloading the DMG manually.
          # - .app.tar.gz sig is what the in-app updater verifies.
          # Absolute paths — `pnpm --filter @woom/desktop exec` switches
          # cwd to apps/desktop/ which breaks relative path resolution.
          DMG_PATH="$PWD/apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/Woom_${VERSION}_universal.dmg"
          test -f "$DMG_PATH" || { echo "::error::DMG not found at $DMG_PATH"; exit 1; }
          test -f "$TARBALL_PATH" || { echo "::error::tarball not found at $TARBALL_PATH"; exit 1; }
          for f in "$DMG_PATH" "$TARBALL_PATH"; do
            pnpm --filter @woom/desktop exec tauri signer sign \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
              "$f"
          done
          ls -la "${DMG_PATH}.sig" "${TARBALL_PATH}.sig"

      - name: Locate DMG
        id: dmg
        run: |
          DMG_PATH=$(ls apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/Woom_${VERSION}_*.dmg | head -1)
          if [[ -z "$DMG_PATH" ]]; then
            echo "::error::DMG not found under target/universal-apple-darwin/release/bundle/dmg/"
            exit 1
          fi
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "Located DMG: $DMG_PATH"

      - name: Verify codesign (pre-notarize)
        if: steps.apple.outputs.enabled == 'true'
        run: |
          codesign --verify --deep --strict --verbose=2 \
            apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/Woom.app

      - name: Notarize DMG
        if: steps.apple.outputs.enabled == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "${{ steps.dmg.outputs.dmg_path }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        if: steps.apple.outputs.enabled == 'true'
        run: |
          xcrun stapler staple "${{ steps.dmg.outputs.dmg_path }}"

      - name: Build manifest (latest-mac.json)
        run: |
          # The manifest's `url` MUST point at the .app.tar.gz tarball —
          # that's what the in-app updater downloads + verifies + extracts.
          # The DMG is published as a sibling artifact for first-install
          # users only; it's NOT referenced from the manifest.
          mkdir -p dist
          node scripts/make-manifest.mjs \
            --dmg "$TARBALL_PATH" \
            --signature "${TARBALL_PATH}.sig" \
            --version "$VERSION" \
            --tag "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --changelog CHANGELOG.md \
            --out dist/latest-mac.json
          cat dist/latest-mac.json | jq 'del(.platforms[].signature)'

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.dmg.outputs.dmg_path }}
            ${{ steps.dmg.outputs.dmg_path }}.sig
            ${{ env.TARBALL_PATH }}
            ${{ env.TARBALL_PATH }}.sig
            dist/latest-mac.json
          generate_release_notes: true
          prerelease: false
          fail_on_unmatched_files: true
