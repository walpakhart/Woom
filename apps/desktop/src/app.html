<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Woom</title>
    <link rel="icon" type="image/svg+xml" href="/woom-mark.svg" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Geist (primary UI) + Geist Mono (code) — modern geometric
         sans-serif system designed for developer tools. Inter +
         JetBrains Mono kept as fallback for hosts that can't reach
         Google Fonts (offline / corporate firewall). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
